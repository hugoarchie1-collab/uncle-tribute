<!--
  card.html — A6 portrait printable share card (105 × 148 mm = 1240 × 1748 px @300dpi).

  Print via Cmd-P → "Save as PDF" (or print directly) for an exact A6 — the
  @page size:A6 + margin:0 makes the browser print dialog default to a true A6
  sheet with no printer margin. Background graphics must be enabled in the
  dialog so the cream ground prints.

  Self-contained: the @font-face blocks are copied verbatim from index.html.
  Estate-voice copy only; no fabricated Stephen quotes.

  SCANNABILITY: cream ground, the branded rose QR is dark-on-cream (the card IS
  the cream surface, so the QR sits directly on it) — never inverted.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/fraunces-roman-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/fraunces-roman-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: block;
        src: url(/fonts/fraunces-italic-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: block;
        src: url(/fonts/fraunces-italic-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Schibsted Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/schibsted-grotesk-latin-ext-var-v1.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Schibsted Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/schibsted-grotesk-latin-var-v1.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @page { size: A6; margin: 0; }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html { background: #d9d1bf; }
      body {
        width: 105mm;
        height: 148mm;
        margin: 0 auto;
        background: #f5efe3;
        color: #1a1612;
        font-family: "Schibsted Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .card {
        width: 105mm;
        height: 148mm;
        padding: 10mm;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .seal {
        width: 22mm;
        height: 22mm;
        object-fit: contain;
        margin-top: 2mm;
      }

      .brand {
        font-family: "Fraunces", Georgia, serif;
        font-variation-settings: "opsz" 144, "wght" 560;
        font-size: 26pt;
        line-height: 1.04;
        letter-spacing: -0.02em;
        color: #1a1612;
        margin-top: 5mm;
        max-width: 78mm;
      }
      .tagline {
        font-size: 10.5pt;
        line-height: 1.4;
        color: #5a544a;
        margin-top: 2.5mm;
        letter-spacing: 0.01em;
      }

      .quiet {
        font-family: "Fraunces", Georgia, serif;
        font-style: italic;
        font-weight: 400;
        font-size: 13pt;
        line-height: 1.45;
        color: #1a1612;
        margin-top: 7mm;
        max-width: 76mm;
      }

      .qr-wrap {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .qr {
        width: 34mm;
        height: 34mm;
        display: block;
      }
      .qr-label {
        font-size: 8pt;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #5a544a;
        margin-top: 3mm;
      }
      .url {
        font-family: "Fraunces", Georgia, serif;
        font-variation-settings: "opsz" 120, "wght" 560;
        font-size: 14pt;
        color: #1a1612;
        margin-top: 1.5mm;
      }

      .foot {
        margin-top: 7mm;
        font-size: 8pt;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #5a544a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="seal" src="/logo/logo-seal-v1-w512.png" alt="The Mandala Company wax seal" />

      <div class="brand">The Mandala Company</div>
      <div class="tagline">the art of stephen meakin.</div>

      <div class="quiet">Estate-stamped giclée editions of his life's work in sacred geometry — direct from the estate.</div>

      <div class="qr-wrap">
        <img class="qr" src="/img/qr/qr-home-rose-v1.svg" alt="QR code linking to themandalacompany.com" />
        <div class="qr-label">Scan to visit</div>
        <div class="url">themandalacompany.com</div>
        <div class="foot">Stephen Meakin · 1966–2021</div>
      </div>
    </div>
  </body>
</html>
