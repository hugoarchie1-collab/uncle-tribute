<!--
  poster-square.html — 1080×1080 social poster (Instagram feed / general square).

  Render at exactly 1080×1080, deviceScaleFactor 1, AFTER document.fonts.ready,
  → /public/share/poster-square-v1.png

  Self-contained: the @font-face blocks are copied verbatim from index.html so
  the poster renders with the real Fraunces + Hanken faces with no network CSS.
  Estate-voice copy only — never attributed to Stephen unless the one permitted
  verbatim line is used WITH its "— SEM" cite.

  SCANNABILITY: the QR is the branded rose SVG on a CREAM chip (dark-on-cream),
  never inverted onto the #0a0908 ground.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/fraunces-roman-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/fraunces-roman-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: block;
        src: url(/fonts/fraunces-italic-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: block;
        src: url(/fonts/fraunces-italic-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/hanken-roman-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url(/fonts/hanken-roman-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body { background: #0a0908; }

      .poster {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #0a0908;
        font-family: "Hanken Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #ede6d6;
      }

      /* Featured painting plate — top ~60%, fading into the dark ground. */
      .plate {
        position: absolute;
        inset: 0 0 auto 0;
        height: 62%;
        background: url(/img/paintings/wild-rose-sussex-pink.jpg) center/cover no-repeat;
      }
      .plate::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(10, 9, 8, 0) 0%,
          rgba(10, 9, 8, 0) 52%,
          rgba(10, 9, 8, 0.55) 78%,
          #0a0908 100%
        );
      }

      .wordmark {
        position: absolute;
        left: 88px;
        bottom: 96px;
        max-width: 640px;
        z-index: 2;
      }
      .eyebrow {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: #c97844;
        margin-bottom: 28px;
      }
      .headline {
        font-family: "Fraunces", Georgia, serif;
        font-variation-settings: "opsz" 144, "wght" 560;
        font-size: 64px;
        line-height: 1.02;
        letter-spacing: -0.02em;
        color: #ede6d6;
        margin-bottom: 30px;
        max-width: 600px;
      }
      .headline em { font-style: italic; font-weight: 400; }
      .brand {
        font-family: "Fraunces", Georgia, serif;
        font-variation-settings: "opsz" 144, "wght" 560;
        font-size: 96px;
        line-height: 0.96;
        letter-spacing: -0.02em;
        color: #ede6d6;
      }
      .tagline {
        margin-top: 18px;
        font-size: 24px;
        line-height: 1.4;
        color: rgba(237, 230, 214, 0.7);
      }

      /* Cream scan chip — bottom-right. */
      .chip {
        position: absolute;
        right: 80px;
        bottom: 80px;
        width: 204px;
        background: #f5efe3;
        border-radius: 28px;
        padding: 22px 22px 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        z-index: 3;
      }
      .chip img { display: block; width: 156px; height: 156px; border-radius: 8px; }
      .chip-label {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1a1612;
      }
    </style>
  </head>
  <body>
    <div class="poster">
      <div class="plate"></div>

      <div class="wordmark">
        <div class="eyebrow">Estate-stamped giclée prints · direct from the estate</div>
        <div class="headline">Sacred geometry, made to <em>live</em> on your wall.</div>
        <div class="brand">The Mandala Company</div>
        <div class="tagline">the art of stephen meakin.</div>
      </div>

      <div class="chip">
        <img src="/img/qr/qr-home-rose-v1.svg" alt="QR code linking to themandalacompany.com" />
        <div class="chip-label">Scan to visit</div>
      </div>
    </div>
  </body>
</html>
