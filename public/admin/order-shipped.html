<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Internal estate tool — keep it out of search results. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Mark order shipped · The Mandala Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0908;
        --surface: #15120f;
        --ink: #ede6d6;
        --ink-soft: rgba(237, 230, 214, 0.72);
        --ink-muted: rgba(237, 230, 214, 0.48);
        --accent: #c97844;
        --divider: rgba(237, 230, 214, 0.16);
        --ok: #6fae7a;
        --err: #d97a6a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        justify-content: center;
        padding: 48px 16px 80px;
      }
      .shell { width: 100%; max-width: 540px; }
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 14px;
      }
      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 700;
        font-size: 40px;
        line-height: 1.08;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
      }
      .lede { color: var(--ink-soft); font-size: 15px; line-height: 1.65; margin: 0 0 28px; }
      .divider { border: 0; border-top: 1px solid var(--divider); margin: 0 0 28px; }
      label { display: block; margin-bottom: 18px; }
      .field-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 8px;
      }
      input[type="text"], input[type="url"], input[type="password"] {
        width: 100%;
        background: rgba(237, 230, 214, 0.04);
        border: 1px solid var(--divider);
        border-radius: 4px;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 14px;
        color: var(--ink);
        transition: border-color 0.2s;
      }
      input::placeholder { color: rgba(237, 230, 214, 0.3); }
      input:focus { outline: none; border-color: var(--accent); }
      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--ink-soft);
        margin: -6px 0 24px;
      }
      .remember input { width: auto; }
      button {
        appearance: none;
        border: 0;
        background: var(--ink);
        color: var(--bg);
        font-family: inherit;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        padding: 14px 26px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.25s, color 0.25s;
      }
      button:hover { background: var(--accent); color: var(--ink); }
      button:disabled { opacity: 0.55; cursor: default; }
      .status {
        margin-top: 22px;
        font-size: 14px;
        line-height: 1.6;
        padding: 14px 16px;
        border-radius: 4px;
        border: 1px solid var(--divider);
        background: var(--surface);
        display: none;
      }
      .status.show { display: block; }
      .status.ok { border-color: var(--ok); color: var(--ok); }
      .status.err { border-color: var(--err); color: var(--err); }
      .hint { font-size: 12px; color: var(--ink-muted); margin: 6px 0 0; }
      code { font-family: "SF Mono", Menlo, Consolas, monospace; color: var(--ink-soft); }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">The Mandala Company · Estate tool</p>
      <h1>Mark an order shipped</h1>
      <p class="lede">
        Once Point 101 dispatches a print, paste the order's details here to send
        the buyer the estate's "your print has shipped" email. Find the
        <code>cs_…</code> session id in the Stripe payment, or in the order
        notification email.
      </p>
      <hr class="divider" />

      <form id="form" novalidate>
        <label>
          <span class="field-label">Stripe session id</span>
          <input id="sessionId" type="text" placeholder="cs_live_…" autocomplete="off" spellcheck="false" required />
        </label>

        <label>
          <span class="field-label">Tracking URL</span>
          <input id="trackingUrl" type="url" placeholder="https://www.royalmail.com/track-your-item#/…" autocomplete="off" spellcheck="false" required />
        </label>

        <label>
          <span class="field-label">Carrier</span>
          <input id="carrier" type="text" list="carriers" placeholder="Royal Mail Tracked 48" autocomplete="off" required />
          <datalist id="carriers">
            <option value="Royal Mail Tracked 48"></option>
            <option value="Royal Mail Tracked 24"></option>
            <option value="Royal Mail Special Delivery"></option>
            <option value="Parcelforce 48"></option>
            <option value="DPD"></option>
            <option value="DHL Express"></option>
            <option value="UPS"></option>
            <option value="FedEx"></option>
          </datalist>
        </label>

        <label>
          <span class="field-label">Admin key</span>
          <input id="secret" type="password" placeholder="Your ADMIN_API_KEY" autocomplete="off" required />
          <p class="hint">This is your <code>ADMIN_API_KEY</code> from Vercel — never shown to buyers.</p>
        </label>

        <div class="remember">
          <input id="remember" type="checkbox" />
          <label for="remember" style="margin: 0; display: inline;">Remember the admin key on this device</label>
        </div>

        <button id="submit" type="submit">Send shipped email →</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

    <script>
      (function () {
        var KEY = "tasm.admin.key";
        var form = document.getElementById("form");
        var statusEl = document.getElementById("status");
        var btn = document.getElementById("submit");
        var secretInput = document.getElementById("secret");
        var rememberInput = document.getElementById("remember");

        // Restore a remembered key (convenience for a private device).
        try {
          var saved = localStorage.getItem(KEY);
          if (saved) {
            secretInput.value = saved;
            rememberInput.checked = true;
          }
        } catch (e) {}

        function setStatus(kind, msg) {
          statusEl.className = "status show " + kind;
          statusEl.textContent = msg;
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          var sessionId = document.getElementById("sessionId").value.trim();
          var trackingUrl = document.getElementById("trackingUrl").value.trim();
          var carrier = document.getElementById("carrier").value.trim();
          var secret = secretInput.value;

          if (!sessionId || !trackingUrl || !carrier || !secret) {
            setStatus("err", "Please fill in every field.");
            return;
          }
          if (sessionId.indexOf("cs_") !== 0) {
            setStatus("err", "Session id should start with cs_ (the Stripe Checkout session).");
            return;
          }

          // Remember / forget the key per the checkbox.
          try {
            if (rememberInput.checked) localStorage.setItem(KEY, secret);
            else localStorage.removeItem(KEY);
          } catch (e) {}

          btn.disabled = true;
          var original = btn.textContent;
          btn.textContent = "Sending…";
          setStatus("", "Sending…");

          try {
            var res = await fetch("/api/admin/order-shipped", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ sessionId: sessionId, trackingUrl: trackingUrl, carrier: carrier, secret: secret }),
            });
            var data = await res.json().catch(function () { return {}; });
            if (res.ok && data.ok) {
              setStatus("ok", "Sent. The shipped email is on its way to " + (data.sent_to || "the buyer") + ".");
              form.reset();
              // Re-restore the remembered key after reset.
              try {
                var s = localStorage.getItem(KEY);
                if (s) { secretInput.value = s; rememberInput.checked = true; }
              } catch (e) {}
            } else {
              setStatus("err", (data.error || "Something went wrong (HTTP " + res.status + ").") + (res.status === 401 ? " — check the admin key." : ""));
            }
          } catch (err) {
            setStatus("err", "Couldn't reach the server. Check your connection and try again.");
          } finally {
            btn.disabled = false;
            btn.textContent = original;
          }
        });
      })();
    </script>
  </body>
</html>
