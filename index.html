<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0908" />
    <meta name="color-scheme" content="dark" />

    <title>The Art of Stephen Meakin — Mandala Artist &amp; Sacred Geometer</title>
    <meta
      name="description"
      content="A tribute and catalogue of the life's work of Stephen Meakin (SEM) — mandala artist and Sacred Geometer. Habundia, Genesis and Born in the Sky: three collections, ten paintings, a lifetime devoted to the geometry of light, pattern and the ever-true."
    />
    <meta name="author" content="The Estate of Stephen Meakin" />

    <!-- Default canonical — serves crawlers that don't execute JS. Once React
         mounts, lib/headMeta.ts MUTATES this tag's href per route (it is the
         document's ONLY canonical — never add a second; react-helmet-async
         was removed 2026-06-10, see CLAUDE.md). -->
    <link rel="canonical" href="https://themandalacompany.com/" data-default-canonical />

    <!-- OpenGraph for shareable links -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Art of Stephen Meakin" />
    <meta property="og:title" content="The Art of Stephen Meakin" />
    <meta
      property="og:description"
      content="A life's work in sacred geometry, mandala painting and visual henosis. Habundia, Genesis, Born in the Sky."
    />
    <!-- Absolute URL — scrapers (Facebook, Slack, iMessage…) resolve og:image
         from the tag alone and many reject relative paths. -->
    <meta property="og:image" content="https://themandalacompany.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="The Wild Rose mandala on an easel in Stephen's garden" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Art of Stephen Meakin" />
    <meta name="twitter:description" content="A life's work in sacred geometry and mandala painting." />
    <meta name="twitter:image" content="https://themandalacompany.com/og-image.jpg" />

    <!-- New wax-seal mark (raster, so PNG favicons replace the old cream-emblem
         SVG). ?v=3 busts the old favicon cache. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-seal-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-seal-16.png?v=3" />
    <!-- Installable, branded home-screen identity (wax-seal rose on the #0a0908
         brand ground). apple-touch-icon for iOS "Add to Home Screen";
         the web manifest gives Android/Chrome the installable app identity. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Stephen Meakin" />
    <meta name="application-name" content="The Art of Stephen Meakin" />

    <!-- Fonts (#10): Fraunces (editorial display serif, true italic for
         quotes) + Hanken Grotesk (quiet body/UI sans). SELF-HOSTED variable
         woff2 (2026-06-10): the render-blocking Google Fonts CSS + two
         third-party preconnects are gone — same files, same axes (Fraunces
         carries opsz 9..144 + wght; Hanken wght), served same-origin from
         /fonts with the latin/latin-ext unicode-range split Google used.
         ⚠️ /fonts is cached immutable 1yr (vercel.json) — replacing a font
         file needs a NEW filename + these @font-face urls updated. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/fraunces-roman-latin.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/hanken-roman-latin.woff2" crossorigin />
    <!-- Italic preloaded too: the home hero's largest line is italic Fraunces
         ("— orbiting a Sun Star…") and quotes use it on most routes — without
         the preload it was the one face that FOUTed. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/fraunces-italic-latin.woff2" crossorigin />
    <style>
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(/fonts/fraunces-roman-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(/fonts/fraunces-roman-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: swap;
        src: url(/fonts/fraunces-italic-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: italic;
        font-weight: 400 600;
        font-display: swap;
        src: url(/fonts/fraunces-italic-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(/fonts/hanken-roman-latin-ext.woff2) format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Hanken Grotesk";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url(/fonts/hanken-roman-latin.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Preload the intro poster (the home LCP) so the landing paints fast.
         ⚠️ Points at the .JPG, not the .webp: the <video poster> attribute (the
         frame actually painted on the common motion-allowed path) takes a single
         URL and can't negotiate webp via <picture>, so it paints poster-v2.jpg
         (VideoIntro.tsx). Preloading the .jpg therefore feeds the REAL LCP;
         fetchpriority=high wins it the request race from byte one. The webp
         poster is still used by the reduced-motion <picture> fallback (loaded
         there, just not preloaded — a tiny minority). The welcome hero painting
         preload was REMOVED 2026-06-11: it taxed every NON-home direct entry
         (painting pages, /verify…) ~62KB for an image a viewport below the fold. -->
    <link rel="preload" as="image" href="/video/poster-v2.jpg" type="image/jpeg" fetchpriority="high" />

    <!-- JSON-LD: site identity for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "@id": "https://themandalacompany.com/#person",
        "name": "Stephen Meakin",
        "alternateName": "SEM",
        "givenName": "Stephen",
        "familyName": "Meakin",
        "birthDate": "1966",
        "birthPlace": "Staffordshire, United Kingdom",
        "nationality": "British",
        "jobTitle": "Mandala Artist, Sacred Geometer",
        "knowsAbout": [
          "Sacred Geometry",
          "Mandala painting",
          "Persian geometric pattern",
          "Celtic pattern",
          "Rose windows",
          "Tibetan mandala"
        ],
        "alumniOf": [
          { "@type": "EducationalOrganization", "name": "Brighton Polytechnic" },
          { "@type": "EducationalOrganization", "name": "Bournemouth University" },
          { "@type": "EducationalOrganization", "name": "University of Brighton" }
        ],
        "founder": {
          "@type": "EducationalOrganization",
          "name": "TAGA — The Art of Geometry Academy",
          "foundingDate": "2010",
          "location": "Phoenix Place, Lewes, East Sussex"
        }
      }
    </script>

    <!-- JSON-LD: brand ENTITY — grounds "The Art of Stephen Meakin" / "The
         Mandala Company" as a recognised organisation (Knowledge-Panel /
         entity signals) and the website itself. Real, verifiable facts only.
         ⚠️ When Hugo creates official Instagram / other estate social
         profiles, add their URLs to the Organization `sameAs` array — that is
         the single strongest signal tying the brand together across the web. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://themandalacompany.com/#organization",
        "name": "The Art of Stephen Meakin",
        "alternateName": "The Mandala Company",
        "url": "https://themandalacompany.com",
        "email": "info@themandalacompany.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://themandalacompany.com/icon-512.png",
          "width": 512,
          "height": 512
        },
        "image": "https://themandalacompany.com/og-image.jpg",
        "description": "The estate of British mandala artist and Sacred Geometer Stephen Meakin (SEM, 1966–2021). Estate-stamped, hand-numbered giclée editions of his life's work, made to order.",
        "foundingLocation": "Lewes, East Sussex, United Kingdom",
        "founder": { "@id": "https://themandalacompany.com/#person" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://themandalacompany.com/#website",
        "url": "https://themandalacompany.com",
        "name": "The Art of Stephen Meakin",
        "inLanguage": "en-GB",
        "publisher": { "@id": "https://themandalacompany.com/#organization" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
